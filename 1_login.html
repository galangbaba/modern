<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Login Modern Farm</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container-login">

    <div class="logo">
      Modern<span>Farm</span>
    </div>

    <div class="login-card">

      <form onsubmit="return prosesLogin()">

        <div class="mb-3 text-start">
          <label>Nama Pengguna / Email</label>
          <input type="email" id="email" class="form-control" placeholder="Masukkan nama pengguna">
        </div>

        <div class="mb-3 text-start">
          <label>Kata Sandi</label>
          <input type="password" id="password" class="form-control" placeholder="Masukkan kata sandi">
        </div>

        <div class="d-grid mt-3">
          <button class="btn btn-login">MASUK</button>
        </div>

        <div class="text-center mt-3">
          <hr>
          atau
          <hr>
        </div>

        <div class="google-btn">
          Lanjutkan dengan Google
        </div>

      </form>

    </div>

    <div class="register">
      Belum punya akun? <a href="register.html">Daftar</a>
    </div>

  </div>

  <script>

    function prosesLogin() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      if (email == "admin@gmail.com" && password == "123") {
        alert("Login berhasil");

        window.location.href = "Dashboard.html";
      } else {
        alert("Email atau password salah");
      }
      return false;
    }

  </script>

</body>

</html>
